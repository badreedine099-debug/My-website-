<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Rap Room</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #8b0000 0%, #3a0000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
            perspective: 1000px;
        }

        /* ستائر الغرفة الفاخرة المحيطة باللوحة */
        .curtain {
            position: absolute;
            top: 0;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, #500 0%, #900 50%, #400 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 5;
            transition: transform 1.5s ease-in-out;
        }
        .curtain-left { left: 0; border-radius: 0 0 50px 0; transform: translateX(-10%); }
        .curtain-right { right: 0; border-radius: 0 0 0 50px; transform: translateX(10%); }

        /* إشعار التفاعل المبدئي للبصريات والصوت */
        .click-prompt {
            position: absolute;
            color: #ffd700;
            font-size: 1.2rem;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border: 2px solid #ffd700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px #ffd700;
            animation: pulse 1.5s infinite;
        }

        /* إطار اللوحة الذهبي الملكي المزخرف */
        .art-frame {
            position: relative;
            width: 85vw;
            max-width: 400px;
            height: 60vh;
            background: #1a1a1a;
            border: 20px solid #ffd700;
            border-image: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transform: rotateX(5deg);
        }

        /* الزخارف الكلاسيكية الإضافية على زوايا الإطار */
        .ornament {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffd700;
            box-shadow: 0 0 10px #aa771c;
            border-radius: 50%;
            z-index: 4;
        }
        .top-left { top: 5px; left: 5px; }
        .top-right { top: 5px; right: 5px; }
        .bottom-left { bottom: 5px; left: 5px; }
        .bottom-right { bottom: 5px; right: 5px; }

        /* قماش اللوحة الداخلي */
        .canvas {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2a0000 30%, #050000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* تمثال كلاسيكي في المنتصف */
        .statue-vibe {
            position: relative;
            width: 120px;
            height: 160px;
            background: linear-gradient(to bottom, #e0e0e0 0%, #888 100%);
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        
        /* نظارات الراب الكلاسيكية أولد سكول */
        .statue-vibe::before {
            content: '';
            position: absolute;
            top: 45px;
            left: 10px;
            width: 100px;
            height: 20px;
            background: #000;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* سلسلة ذهبية تتدلى أسفل التمثال */
        .gold-chain {
            position: absolute;
            bottom: 20px;
            width: 70px;
            height: 30px;
            border: 6px solid #ffd700;
            border-top: none;
            border-radius: 0 0 50px 50px;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.6));
        }

        /* خطوط ممتص الصدمات الصوتي (Equalizer) المتفاعلة مع الموسيقى */
        .eq-container {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 5px;
            height: 40px;
            align-items: flex-end;
        }

        .bar {
            width: 4px;
            height: 5px;
            background: linear-gradient(to top, #ffd700, #ff3300);
            border-radius: 2px;
        }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 40px; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>

    <div class="click-prompt" id="startBtn">اضغط لدخول الغرفة الفنية</div>

    <div class="art-frame" id="artFrame">
        <div class="ornament top-left"></div>
        <div class="ornament top-right"></div>
        <div class="ornament bottom-left"></div>
        <div class="ornament bottom-right"></div>
        
        <div class="canvas">
            <div class="statue-vibe"></div>
            <div class="gold-chain"></div>

            <div class="eq-container" id="eq">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const bars = document.querySelectorAll('.bar');
        let audioCtx = null;
        let isPlaying = false;

        startBtn.addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true;

            startBtn.style.display = 'none';
            document.querySelector('.curtain-left').style.transform = 'translateX(-60%)';
            document.querySelector('.curtain-right').style.transform = 'translateX(60%)';

            // تفعيل حركة الـ Equalizer بصرياً بالتزامن
            bars.forEach((bar, index) => {
                bar.style.animation = `bounce ${0.3 + index * 0.1}s ease-in-out infinite alternate`;
            });

            initOldSchoolBeat();
        });

        function initOldSchoolBeat() {
            // تهيئة البيئة الصوتية بشكل آمن لمتصفحات الهواتف
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let tempo = 90; 
            let beatDuration = 60 / tempo;

            // دالة الركلة الدافئة (Kick) للـ Old School
            function playKick(time) {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine'; // موجة جيبية نقية لمنع التشويش
                osc.frequency.setValueAtTime(150, time);
                osc.frequency.exponentialRampToValueAtTime(40, time + 0.2);
                
                gain.gain.setValueAtTime(0.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);

                osc.start(time);
                osc.stop(time + 0.25);
            }

            // دالة النغمة الكلاسيكية الرقيقة (Melody)
            function playTone(freq, time, duration) {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle'; // صوت ناعم جداً يشبه الآلات الوترية القديمة
                osc.frequency.setValueAtTime(freq, time);
                
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.15, time + 0.05); // صعود ناعم للصوت لمنع الفرقعة
                gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

                osc.start(time);
                osc.stop(time + duration);
            }

            // حلقة التكرار المستمر (Loop)
            function sequence(time) {
                // النمط الإيقاعي
                playKick(time);
                playKick(time + beatDuration * 0.75);
                playKick(time + beatDuration * 2);
                
                // النغمات الموسيقية الفاخرة (تدرج كلاسيكي)
                playTone(220.00, time, beatDuration * 1.5); // نغمة لـ A3
                playTone(261.63, time + beatDuration, beatDuration); // نغمة لـ C4
                playTone(329.63, time + beatDuration * 2, beatDuration * 1.5); // نغمة لـ E4
                playTone(196.00, time + beatDuration * 3, beatDuration); // نغمة لـ G3

                // جدولة التكرار التالي تلقائياً
                let nextTime = time + beatDuration * 4;
                setTimeout(() => sequence(nextTime), beatDuration * 4 * 1000);
            }

            // بدء التشغيل
            sequence(audioCtx.currentTime);
        }
    </script>
</body>
</html>
